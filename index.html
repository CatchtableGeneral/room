<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>회의실 디스플레이</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:"Pretendard",sans-serif;background:#EBECEE;-webkit-font-smoothing:antialiased;color:#1F2124;}
  .fit-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#EBECEE;overflow:hidden;}
  .fit-wrap.scroll{align-items:flex-start;justify-content:center;overflow-y:auto;background:radial-gradient(1100px 520px at 50% -8%, rgba(255,80,63,0.18), rgba(255,80,63,0) 62%), #0C0D11;}
  .page{width:1920px;height:1080px;background:#fff;position:relative;display:flex;transform-origin:center center;flex:none;overflow:hidden;}

  /* ===== 사이드바 (코랄) ===== */
  .side{width:400px;flex:0 0 400px;background:linear-gradient(160deg,#FF6350 0%,#FF503F 46%,#F03A29 100%);color:#fff;padding:48px 50px;display:flex;flex-direction:column;}
  .logo{font-size:30px;font-weight:900;letter-spacing:3px;}
  .rtitle{margin-top:34px;font-size:38px;line-height:1.15;font-weight:800;letter-spacing:-0.03em;white-space:nowrap;}
  .hr{height:1px;background:rgba(255,255,255,0.28);margin:24px 0 18px;}
  .ask{font-size:18px;line-height:1.7;}
  .ask .op{opacity:0.78;} .ask .sep{opacity:0.4;margin:0 10px;} .ask b{font-weight:600;}
  .sched{margin-top:26px;}
  .sched-head{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .sched-status{font-size:13px;font-weight:800;padding:4px 12px;border-radius:14px;background:rgba(0,0,0,0.18);display:inline-flex;align-items:center;}
  .sched-status .sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;}
  .sched-status.s-free .sdot{background:#37D08A;box-shadow:0 0 8px #37D08A;}
  .sched-status.s-busy .sdot{background:#4AA3FF;box-shadow:0 0 8px #4AA3FF;}
  .sched-status.s-sample .sdot{background:#e0e0e0;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .now-tag .blink{animation:blink 1.1s infinite;}
  .sched-list{display:flex;flex-direction:column;gap:6px;}
  .sch-item{background:rgba(255,255,255,0.15);border-radius:10px;padding:8px 12px;border-left:3px solid rgba(255,255,255,0.65);}
  .sch-item .t{font-size:14px;font-weight:800;}
  .sch-item .n{font-size:13px;opacity:0.92;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sch-item.now{background:rgba(255,255,255,0.34);border-left-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.55);}
  .sch-item.now .now-tag{font-size:12px;font-weight:800;margin-bottom:5px;letter-spacing:0.02em;}
  .sch-item.past{opacity:0.45;}
  .sch-empty{font-size:14px;opacity:0.85;background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center;}
  .side-bottom{margin-top:auto;padding-top:24px;display:flex;flex-direction:column;gap:16px;}
  .pill{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.32);padding:11px 20px;border-radius:999px;font-size:17px;font-weight:600;}
  .bubble{align-self:flex-start;background:#D6321E;color:#fff;border:1px solid rgba(255,255,255,0.28);padding:17px 24px;border-radius:22px 22px 22px 6px;font-size:20px;font-weight:700;line-height:1.4;box-shadow:0 8px 22px rgba(0,0,0,0.25);}

  /* ===== 메인 ===== */
  .main{flex:1;padding:44px 60px;display:flex;flex-direction:column;justify-content:flex-start;background:#FBFBFC;overflow:hidden;}
  .inner{width:100%;max-width:1300px;height:100%;margin:0 auto;display:flex;flex-direction:column;}
  .m-head{display:flex;align-items:baseline;gap:14px;}
  .m-head h2{margin:0;font-size:30px;font-weight:800;letter-spacing:-0.02em;}
  .m-head .s{font-size:17px;color:#8A9099;font-weight:500;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-top:22px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:16px;}
  .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:20px;}
  .row4 .imgslot{height:160px;margin:14px 0 4px;}
  .row4 .gcard{padding:20px;}
  .row4 .gc-tt{font-size:18px;}
  .row4 ol.steps{gap:10px;margin-top:14px;}
  .row4 ol.steps li{font-size:15px;}
  .row4 .tip{font-size:13px;padding:11px 14px;margin-top:14px;}
  .gcard{background:#fff;border:1px solid #ECEDEF;border-radius:22px;padding:24px;display:flex;flex-direction:column;}
  .gc-head{display:flex;align-items:center;gap:12px;}
  .gc-ic{width:42px;height:42px;border-radius:12px;background:#FFECE9;display:inline-flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
  .gc-ey{font-size:14px;font-weight:700;color:#FF503F;letter-spacing:0.04em;}
  .gc-tt{font-size:20px;font-weight:800;}
  .imgslot{width:100%;height:250px;margin:16px 0 4px;border-radius:16px;background:#F1F2F4;border:2px dashed #D7DADF;display:flex;align-items:center;justify-content:center;font-size:14px;color:#9aa0a6;text-align:center;padding:8px;}
  ol.steps{list-style:none;margin:16px 0 0;padding:0;display:flex;flex-direction:column;gap:13px;}
  ol.steps li{display:flex;gap:12px;align-items:flex-start;font-size:17px;line-height:1.5;}
  .num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:#FF503F;color:#fff;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;}
  .steps b{font-weight:800;}
  .tip{margin-top:16px;background:#FFF7F5;border-radius:14px;padding:13px 18px;font-size:15px;line-height:1.5;color:#B24435;}
  .etq{margin-top:auto;background:#fff;border:1px solid #ECEDEF;border-radius:22px;padding:20px 32px;}
  .etq-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .etq-bar{width:7px;height:24px;border-radius:3px;background:#FF503F;}
  .etq-h h3{margin:0;font-size:23px;font-weight:800;}
  .etq-h .s{font-size:16px;color:#8A9099;font-weight:500;}
  .etq-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .etq-item{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .etq-circle{width:76px;height:76px;border-radius:50%;background:#FFECE9;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .etq-item span{font-size:16px;font-weight:600;}
  .ulm{list-style:none;margin:18px 0 0;padding:0;display:flex;flex-direction:column;gap:13px;}
  .ulm li{display:flex;gap:11px;align-items:flex-start;font-size:16px;line-height:1.5;}
  .ulm .dot{color:#FF503F;font-weight:800;}
  .vc{background:#fff;border:1px solid #ECEDEF;border-radius:22px;padding:20px;display:flex;gap:24px;margin-top:16px;}
  .vc-r{flex:1;display:flex;flex-direction:column;justify-content:center;}

  /* ===== 방 선택 (B 다크) ===== */
  .picker{width:1160px;max-width:94vw;padding:84px 44px 110px;margin:0 auto;color:#fff;}
  .pk-brand{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:800;letter-spacing:2.5px;color:#FF6B57;}
  .pk-brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#FF7A66,#FF3D2E);box-shadow:0 0 12px rgba(255,90,71,0.9);}
  .pk-title{font-size:48px;font-weight:800;letter-spacing:-2px;margin-top:18px;color:#F7F8FA;}
  .pk-sub{font-size:16px;color:#8b8f9c;margin-top:12px;font-weight:500;}
  .pgrp{margin-top:44px;}
  .pgrp h3{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;color:#FF7A66;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
  .pgrp h3 .cnt{font-size:12px;font-weight:700;color:#aeb3bf;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);padding:2px 10px;border-radius:20px;letter-spacing:0;text-transform:none;}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px;}
  .pbtn{position:relative;background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:22px 22px 20px;text-decoration:none;display:flex;flex-direction:column;gap:12px;transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;overflow:hidden;}
  .pbtn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc);opacity:0.9;}
  .pbtn:hover{transform:translateY(-4px);background:rgba(255,255,255,0.08);border-color:var(--tc);box-shadow:0 14px 34px rgba(0,0,0,0.45);}
  .pbtn .rn{font-size:21px;font-weight:700;color:#F5F6F8;letter-spacing:-0.4px;}
  .pbtn .rt{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#aab0bc;}
  .pbtn .rt .tdot{width:8px;height:8px;border-radius:50%;background:var(--tc);box-shadow:0 0 8px var(--tc);}
  .pbtn .arr{position:absolute;right:18px;bottom:18px;color:var(--tc);opacity:0;transform:translateX(-4px);transition:all .18s ease;font-size:16px;font-weight:800;}
  .pbtn:hover .arr{opacity:1;transform:translateX(0);}
</style>
</head>
<body>
<div class="fit-wrap" id="fit"><div class="page" id="page"></div></div>

<script>
const CONFIG = { appsScriptUrl: "https://script.google.com/a/macros/catchtable.co.kr/s/AKfycbyfD-wzNoO_j-t-k2J66D6vZOzpv8cftt7Bj9Ay-pBwTGDYuumrGD8osh3I9dx9uI4/exec" };

const TYPES = {
  general:  {label:"일반 회의실",   eyebrow:"회의실 장비 이용 가이드",   kind:"standard", video:false, pick:"#FFFFFF"},
  interview:{label:"면접 우선",     eyebrow:"인터뷰 전용 공간",          kind:"interview",             pick:"#35D19A"},

const ROOMS = {
  cuisine:{name:"Cuisine Room",type:"general",office:"판교A"},savor:{name:"Savor Room",type:"general",office:"판교A"},
  corkage:{name:"Corkage Room",type:"general",office:"판교A"},dining:{name:"Dining Room",type:"general",office:"판교A"},
  pairing:{name:"Pairing Room",type:"general",office:"판교A"},gourmet:{name:"Gourmet Room",type:"general",office:"판교A"},
  cooking:{name:"Cooking Room",type:"general",office:"판교A"},plating:{name:"Plating Room",type:"general",office:"판교A"},
  tasting:{name:"Tasting Room",type:"general",office:"판교A"},exec1:{name:"임원용1",type:"exec",office:"판교A"},
  exec2:{name:"임원용2",type:"exec",office:"판교A"},exec3:{name:"임원용3",type:"exec",office:"판교A"},
  winery:{name:"Winery Room",type:"general",office:"판교B"},terrace:{name:"Terrace Room",type:"general",office:"판교B"},
  roasting:{name:"Roasting Room",type:"general",office:"판교B"},baking:{name:"Baking Room",type:"general",office:"판교B"},
  interview1:{name:"Interview Room1",type:"interview",office:"판교B"},interview2:{name:"Interview Room2",type:"interview",office:"판교B"},
  party:{name:"Party Room",type:"video",office:"판교B"},flavor:{name:"Flavor Room",type:"general",office:"페이"},
  searing:{name:"Searing Room",type:"general",office:"부산"}
};

function sidebar(room,t){
  const bubble = (t.kind==="interview")
    ? "좋은 첫인상은<br>조용한 환경에서 시작돼요 🤝"
    : "연결은 5초면 끝!<br>바로 회의 시작해요 👍";
  return `<aside class="side">
    <div class="logo">CATCHTABLE</div>
    <h1 class="rtitle">${room.name}</h1>
    <div class="hr"></div>
    <div class="ask"><span class="op">문의</span><span class="sep">|</span><b>슬랙 #help-총무</b></div>
    <div class="sched">
      <div class="sched-head">금일 스케줄 <span class="sched-status" id="schStatus">…</span></div>
      <div class="sched-list" id="schList"><div class="sch-empty">불러오는 중…</div></div>
    </div>
    <div class="side-bottom">
      <div class="pill">일하기 좋은 회의문화 만들기</div>
      <div class="bubble">${bubble}</div>
    </div>
  </aside>`;
}

const CARD_VIDEO = `
    <section class="gcard">
      <div class="gc-head"><span class="gc-ic">📹</span><div><div class="gc-ey">화상회의</div><div class="gc-tt">회의 참가</div></div></div>
      <div class="imgslot">회의실 태블릿 화면 영역</div>
      <ol class="steps">
        <li><span class="num">1</span><span>예약된 회의 선택 후 <b>‘참가’</b> 터치.</span></li>
        <li><span class="num">2</span><span>카메라·마이크가 켜지고 TV가 <b>회의 화면</b>으로 전환.</span></li>
      </ol>
      <div class="tip">💡 내 회의가 없으면 <b>‘참가’</b> 후 회의코드(ID) 입력.</div>
    </section>`;
const CARD_WIRED = `
    <section class="gcard">
      <div class="gc-head"><span class="gc-ic">🔌</span><div><div class="gc-ey">유선 연결</div><div class="gc-tt">HDMI 케이블</div></div></div>
      <div class="imgslot">유선 연결 사진 영역</div>
      <ol class="steps">
        <li><span class="num">1</span><span>책상의 <b>HDMI 케이블</b>을 노트북에 꽂아주세요.</span></li>
        <li><span class="num">2</span><span><b>끝!</b> 화면이 바로 TV에 표시돼요.</span></li>
      </ol>
      <div class="tip">💡 회의가 끝나면 <b>케이블만 빼면</b> 끝!</div>
    </section>`;
const CARD_MAC = `
    <section class="gcard">
      <div class="gc-head"><span class="gc-ic">📡</span><div><div class="gc-ey">무선 연결</div><div class="gc-tt">Mac 사용자</div></div></div>
      <div class="imgslot">Mac 화면 캡처 영역</div>
      <ol class="steps">
        <li><span class="num">1</span><span>우측 상단 <b>제어센터</b> → <b>‘화면 미러링’</b>.</span></li>
        <li><span class="num">2</span><span>목록에서 <b>회의실 TV</b> 선택.</span></li>
        <li><span class="num">3</span><span>TV에 뜬 <b>코드</b> 입력하면 완료!</span></li>
      </ol>
      <div class="tip">💡 코드는 처음 연결할 때만 입력.</div>
    </section>`;
const CARD_WIN = `
    <section class="gcard">
      <div class="gc-head"><span class="gc-ic">📡</span><div><div class="gc-ey">무선 연결</div><div class="gc-tt">Windows 사용자</div></div></div>
      <div class="imgslot">Windows 화면 캡처 영역</div>
      <ol class="steps">
        <li><span class="num">1</span><span>키보드에서 <b>Win + K</b>.</span></li>
        <li><span class="num">2</span><span><b>‘캐스트’</b> 목록에서 회의실 TV 선택.</span></li>
        <li><span class="num">3</span><span>자동 연결되면 완료!</span></li>
      </ol>
      <div class="tip">💡 목록에 TV가 없으면 <b>Wi-Fi</b> 확인.</div>
    </section>`;

function etiquette(items, title, sub){
  const cells = items.map(i=>`<div class="etq-item"><div class="etq-circle">${i[0]}</div><span>${i[1]}</span></div>`).join("");
  return `<section class="etq"><div class="etq-h"><span class="etq-bar"></span><h3>${title}</h3><span class="s">${sub}</span></div><div class="etq-grid">${cells}</div></section>`;
}

function mainStandard(room,t){
  const etq = etiquette([["⏰","이용시간 준수"],["🗑️","쓰레기 정리"],["🪑","자리 정리"],["💡","소등 후 퇴실"],["🔌","장비 원위치"]],
    "회의실 사용 에티켓","다음 사용자를 위해 함께 지켜주세요");
  let head, cards, rowClass;
  if(t.video){
    head=`<div class="m-head"><h2>회의실 이용 가이드</h2><span class="s">화상회의 참여 &amp; 노트북 화면 연결</span></div>`;
    cards=CARD_VIDEO+CARD_WIRED+CARD_MAC+CARD_WIN;  // 한 줄에 좌우로
    rowClass="row4";
  } else {
    head=`<div class="m-head"><h2>TV에 노트북 화면 연결하기</h2><span class="s">상황에 맞는 방법을 골라 연결하세요</span></div>`;
    cards=CARD_WIRED+CARD_MAC+CARD_WIN;
    rowClass="row3";
  }
  return `<main class="main"><div class="inner">${head}<div class="${rowClass}">${cards}</div>${etq}</div></main>`;
}

function mainInterview(room,t){
  const steps = `
  <div class="m-head"><h2>인터뷰 진행 순서</h2><span class="s">지원자에게 좋은 경험을 남기는 3단계</span></div>
  <div class="row3">
    <section class="gcard"><div class="gc-head"><span class="gc-ic">🗓️</span><div><div class="gc-ey">STEP 1</div><div class="gc-tt">인터뷰 전</div></div></div>
      <ul class="ulm"><li><span class="dot">·</span><span>예약 <b>10분 전</b> 입실해 자료·노트북을 준비해요.</span></li>
      <li><span class="dot">·</span><span>화상 인터뷰는 <b>연결·카메라·마이크</b>를 미리 테스트해요.</span></li>
      <li><span class="dot">·</span><span>문 앞에 <b>‘인터뷰 중’</b> 표시를 걸어주세요.</span></li></ul></section>
    <section class="gcard"><div class="gc-head"><span class="gc-ic">💬</span><div><div class="gc-ey">STEP 2</div><div class="gc-tt">인터뷰 중</div></div></div>
      <ul class="ulm"><li><span class="dot">·</span><span>지원자가 편안하도록 <b>정숙한 환경</b>을 유지해요.</span></li>
      <li><span class="dot">·</span><span>노크·전화 등 <b>외부 방해</b>가 없도록 신경 써요.</span></li>
      <li><span class="dot">·</span><span>화면 공유가 필요하면 아래 <b>연결 방법</b>을 참고하세요.</span></li></ul></section>
    <section class="gcard"><div class="gc-head"><span class="gc-ic">✅</span><div><div class="gc-ey">STEP 3</div><div class="gc-tt">인터뷰 후</div></div></div>
      <ul class="ulm"><li><span class="dot">·</span><span>지원자 <b>자료·메모</b>는 반드시 회수·파기해요.</span></li>
      <li><span class="dot">·</span><span>책상·의자를 <b>원위치</b>하고 쓰레기를 정리해요.</span></li>
      <li><span class="dot">·</span><span>다음 인터뷰를 위해 <b>바로 비워</b> 주세요.</span></li></ul></section>
  </div>`;
  const conn = `
  <div class="m-head" style="margin-top:26px;"><h2 style="font-size:22px;">화상 인터뷰 연결하기</h2><span class="s">원격 지원자와 화면을 공유할 때</span></div>
  <div class="row2">
    <section class="gcard" style="flex-direction:row;align-items:center;gap:16px;padding:18px 22px;"><span class="gc-ic">🔌</span><div><div class="gc-tt" style="font-size:17px;">유선 · HDMI</div><div style="font-size:15px;color:#4A4F55;line-height:1.5;">책상의 <b>HDMI 케이블</b>을 노트북에 꽂으면 바로 TV에 표시돼요.</div></div></section>
    <section class="gcard" style="flex-direction:row;align-items:center;gap:16px;padding:18px 22px;"><span class="gc-ic">📡</span><div><div class="gc-tt" style="font-size:17px;">무선 · 화면 미러링</div><div style="font-size:15px;color:#4A4F55;line-height:1.5;">Mac <b>화면 미러링</b> / Windows <b>Win + K</b>로 회의실 TV 선택.</div></div></section>
  </div>`;
  const etq = etiquette([["📅","인터뷰 우선 예약"],["🤫","정숙 유지"],["🔒","지원자 자료 보안"],["🪑","자리 정리"],["💡","소등 후 퇴실"]],
    "인터뷰룸 이용 에티켓","지원자와 다음 인터뷰를 위해 지켜주세요");
  return `<main class="main"><div class="inner">${steps}${conn}<div style="margin-top:26px;">${etq}</div></div></main>`;
}

function viewPicker(){
  const offices=[];Object.values(ROOMS).forEach(r=>{if(!offices.includes(r.office))offices.push(r.office);});
  let grps="";
  offices.forEach(o=>{
    const list=Object.entries(ROOMS).filter(([k,r])=>r.office===o);
    let btns="";
    list.forEach(([k,r])=>{
      const t=TYPES[r.type];
      btns+=`<a class="pbtn" href="?room=${k}" style="--tc:${t.pick}"><span class="rn">${r.name}</span><span class="rt"><span class="tdot"></span>${t.label}</span><span class="arr">→</span></a>`;
    });
    grps+=`<div class="pgrp"><h3>${o} 사무실 <span class="cnt">${list.length}</span></h3><div class="pgrid">${btns}</div></div>`;
  });
  return `<div class="picker"><div class="pk-brand"><span class="dot"></span>CATCHTABLE</div>
    <div class="pk-title">회의실을 선택하세요</div>
    <div class="pk-sub">이 화면에서 사용할 회의실을 한 번만 누르면, 이후 그 방 가이드가 표시됩니다.</div>${grps}</div>`;
}

function getParam(n){const m=new RegExp('[?&]'+n+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
function fmt(ms){const d=new Date(ms);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function setT(h,m){const d=new Date();d.setHours(h,m,0,0);return d.getTime();}
const MOCK={events:[{title:"주간 팀 미팅",start:setT(10,0),end:setT(11,0)},{title:"프로젝트 리뷰",start:setT(14,0),end:setT(15,30)},{title:"1:1 면담",start:setT(16,0),end:setT(16,30)}]};

function loadSchedule(key){
  if(!CONFIG.appsScriptUrl){renderSched(MOCK.events,true);return;}
  const cb='cb_'+Math.random().toString(36).slice(2);
  const s=document.createElement('script');
  let done=false;
  const finish=(events,sample)=>{if(done)return;done=true;renderSched(events,sample);try{delete window[cb];s.remove();}catch(e){}};
  window[cb]=(data)=>finish((data&&data.events)||[], false);
  s.onerror=()=>finish(MOCK.events, true);
  s.src=CONFIG.appsScriptUrl+'?room='+encodeURIComponent(key)+'&callback='+cb;
  document.head.appendChild(s);
  setTimeout(()=>finish(MOCK.events,true), 8000); // 응답 지연 시 샘플 폴백
}
function renderSched(events,sample){
  const listEl=document.getElementById('schList'),stEl=document.getElementById('schStatus');
  if(!listEl)return;
  const now=Date.now();const busy=events.some(e=>now>=e.start&&now<e.end);
  if(stEl){
    const cls=sample?'s-sample':(busy?'s-busy':'s-free');
    const label=sample?'샘플':(busy?'사용 중':'사용 가능');
    stEl.className='sched-status '+cls;
    stEl.innerHTML='<span class="sdot"></span>'+label;
  }
  if(!events.length){listEl.innerHTML=`<div class="sch-empty">오늘 예약이 없습니다</div>`;return;}
  listEl.innerHTML=events.slice().sort((a,b)=>a.start-b.start).map(e=>{
    const on=now>=e.start&&now<e.end, past=e.end<=now;
    const cls='sch-item'+(on?' now':'')+(past?' past':'');
    return `<div class="${cls}">${on?'<div class="now-tag"><span class="blink">●</span> 진행 중</div>':''}<div class="t">${fmt(e.start)} – ${fmt(e.end)}</div><div class="n">${e.title||"예약됨"}</div></div>`;
  }).join("");
}

function fit(){
  const page=document.getElementById('page');
  if(!ROOMS[(getParam('room')||'').toLowerCase()]){page.style.transform='none';return;}
  const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  page.style.transform='scale('+s+')';
}
function render(){
  const page=document.getElementById('page'),fitw=document.getElementById('fit');
  const key=(getParam('room')||'').toLowerCase();const room=ROOMS[key];
  fitw.classList.toggle('scroll',!room);
  if(!room){
    page.style.width='auto';page.style.height='auto';page.style.background='transparent';
    page.innerHTML=viewPicker();
  } else {
    const t=TYPES[room.type]||TYPES.general;
    page.style.width='1920px';page.style.height='1080px';page.style.background='#fff';
    page.innerHTML=sidebar(room,t)+(t.kind==="interview"?mainInterview(room,t):mainStandard(room,t));
    document.title=room.name+' · 회의실 가이드';
    loadSchedule(key);setInterval(()=>loadSchedule(key),30000);
  }
  fit();
}
window.addEventListener('resize',fit);
render();

/* 새 배포 자동 감지 → 자동 새로고침 (스틱에서 수동 새로고침 불필요) */
var __deployStamp=null;
function __checkDeploy(){
  fetch('index.html?_t='+Date.now(),{method:'HEAD',cache:'no-store'})
    .then(function(r){
      var lm=r.headers.get('ETag')||r.headers.get('Last-Modified');
      if(lm){ if(__deployStamp && lm!==__deployStamp){ location.reload(); } __deployStamp=lm; }
    }).catch(function(){});
}
__checkDeploy();                         // 최초 기준값 기록
setInterval(__checkDeploy, 5*60*1000);   // 5분마다 새 배포 확인 → 있으면 자동 새로고침
</script>
