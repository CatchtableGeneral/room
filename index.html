<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>회의실 디스플레이</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:"Pretendard",sans-serif;background:#EBECEE;-webkit-font-smoothing:antialiased;color:#1F2124;word-break:keep-all;}
  .fit-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#EBECEE;overflow:hidden;}
  .fit-wrap.dark{background:radial-gradient(1100px 520px at 50% -8%, rgba(253,61,0,0.18), rgba(253,61,0,0) 62%), #0C0D11;}
  .page{width:1920px;height:1080px;background:#fff;position:relative;display:flex;flex:none;overflow:hidden;transform-origin:center center;}

  /* ===== 사이드바 (코랄) ===== */
  .side{width:460px;flex:0 0 460px;background:linear-gradient(155deg,#FF6A3A 0%,#FD3D00 100%);color:#fff;padding:48px 50px 30px;display:flex;flex-direction:column;position:relative;z-index:2;box-shadow:8px 0 24px rgba(0,0,0,0.16);}
  /* 화상회의실 : 그라데이션 없이 단색 로고 오렌지 */
  .side.solid{background:#FD3D00;}
  /* 임원 회의실 : 흰 배경 + 어두운 글씨 */
  .side.light{background:#FFFFFF;color:#1F2124;box-shadow:8px 0 24px rgba(0,0,0,0.10);}
  .side.light .logo{color:#FD3D00;}
  .side.light .rtitle{color:#1F2124;}
  .side.light .hr{background:rgba(0,0,0,0.12);}
  .side.light .ask{color:#5A5F66;}
  .side.light .ask b{color:#1F2124;}
  .side.light .sched-head{color:#1F2124;}
  .side.light .sched-status{background:#F1F2F4;color:#FD3D00;}
  .side.light .sch-item{background:#F4F5F7;border-left-color:#CED2D8;}
  .side.light .sch-item .t{color:#1F2124;}
  .side.light .sch-item .n{color:#5A5F66;}
  .side.light .sch-empty{background:#F4F5F7;color:#8A9099;}
  .side.light .bubble{background:#fff;color:#FD3D00;border:2px solid #FD3D00;}
  .side.light .now-tag{color:#1F2124;}
  .logo{font-size:30px;font-weight:900;letter-spacing:3px;}
  .logo-img{height:44px;width:auto;display:block;}
  .rtitle{margin-top:22px;font-size:42px;line-height:1.12;font-weight:800;letter-spacing:-0.03em;}
  .hr{height:1px;background:rgba(255,255,255,0.28);margin:16px 0 12px;}
  .ask{font-size:18px;line-height:1.5;}
  .ask .op{opacity:0.78;} .ask .sep{opacity:0.4;margin:0 10px;} .ask b{font-weight:600;}
  .sched{margin-top:16px;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
  .sched-head{font-size:21px;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:13px;}
  .sched-status{font-size:13px;font-weight:800;padding:4px 12px;border-radius:14px;background:#fff;color:#FD3D00;display:inline-flex;align-items:center;}
  .sched-status .sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;}
  .sched-status.s-free .sdot{background:#2FCB84;box-shadow:0 0 8px #2FCB84;}
  .sched-status.s-busy .sdot{background:#FF2D55;box-shadow:0 0 8px #FF2D55;}
  .sched-status.s-loading .sdot{background:#c0c4cc;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
  .now-tag .blink{color:#FF2D55;animation:blink 1.1s infinite;}
  .sch-item.free{background:#fff;border-left:4px solid #2FCB84;box-shadow:0 3px 12px rgba(0,0,0,0.16);}
  .sch-item.free .t{color:#14A05C;}
  .sch-item.free .n{color:#1C7D4A;opacity:1;}
  .sch-item.free .free-tag{font-size:12px;font-weight:800;margin-bottom:5px;letter-spacing:0.02em;color:#2FCB84;}
  .sch-item.free .free-tag .blink{color:#2FCB84;animation:blink 1.1s infinite;}
  .sch-item.soon{background:#fff;border-left:4px solid #2FCB84;box-shadow:0 3px 12px rgba(0,0,0,0.16);display:flex;align-items:center;gap:10px;}
  .sch-item.soon .t{color:#14A05C;padding-left:10px;border-left:1.5px solid rgba(20,160,92,0.4);}
  .sch-item.soon .soon-tag{font-size:12px;font-weight:800;margin-bottom:0;letter-spacing:0.02em;color:#14A05C;white-space:nowrap;}
  .sch-item.soon .soon-tag .blink{color:#2FCB84;animation:blink 1.1s infinite;}
  .sched-list.two .sch-item.soon{display:block;}
  .sched-list.two .sch-item.soon .t{border-left:none;padding-left:0;margin-top:2px;}
  .sched-list{display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:0;overflow:hidden;}
  .sched-list.two{display:block;column-count:2;column-gap:8px;}
  .sched-list.two .sch-item{break-inside:avoid;margin-bottom:5px;}
  .sched-list.dense .sch-item{padding:5px 10px;margin-bottom:4px;}
  .sched-list.dense .sch-item .t{font-size:12px;}
  .sched-list.dense .sch-item .n{font-size:11px;}
  .sched-list.dense .sch-item.now .now-tag{font-size:11px;margin-bottom:3px;}
  .sched-list.dense .sch-item.past{padding:2px 10px;}
  .sch-item{background:rgba(255,255,255,0.15);border-radius:11px;padding:10px 14px;border-left:4px solid rgba(255,255,255,0.65);}
  .sch-item .t{font-size:16px;font-weight:800;white-space:nowrap;}
  .sch-item .n{font-size:14.5px;opacity:0.92;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sch-item.now{background:#fff;border-left:4px solid #FF2D55;box-shadow:0 3px 12px rgba(0,0,0,0.16);}
  .sch-item.now .t{color:#FD3D00;}
  .sch-item.now .n{color:#D6321E;opacity:1;}
  .sch-item.now .now-tag{font-size:12px;font-weight:800;margin-bottom:5px;letter-spacing:0.02em;color:#FF2D55;}
  .side.light .sch-item.now{background:#FFE7E3;}
  .side.light .sch-item.now .t{color:#FD3D00;}
  .side.light .sch-item.now .n{color:#D6321E;}
  .sch-item.past{opacity:0.5;display:flex;align-items:baseline;flex-wrap:nowrap;gap:7px;padding:3px 12px;}
  .sch-item.past .t{font-size:12px;white-space:nowrap;flex:none;}
  .sch-item.past .n{font-size:11px;margin-top:0;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sch-empty{font-size:14px;opacity:0.85;background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center;}
  .side-bottom{margin-top:14px;padding-top:0;flex:none;display:flex;flex-direction:column;gap:16px;}
  .pill{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.32);padding:11px 20px;border-radius:999px;font-size:17px;font-weight:600;}
  .bubble{align-self:flex-start;background:#fff;color:#FD3D00;padding:17px 24px;border-radius:22px 22px 22px 6px;font-size:20px;font-weight:700;line-height:1.4;box-shadow:0 8px 22px rgba(0,0,0,0.18);}

  /* ===== 메인 ===== */
  .main{flex:1;padding:44px 60px;display:flex;flex-direction:column;justify-content:flex-start;background:#FBFBFC;overflow:hidden;}
  .inner{width:100%;max-width:1460px;height:100%;margin:0 auto;display:flex;flex-direction:column;}
  .m-head{display:flex;align-items:baseline;gap:14px;}
  .m-head h2{margin:0;font-size:30px;font-weight:800;letter-spacing:-0.02em;}
  .m-head .s{font-size:17px;color:#8A9099;font-weight:500;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-top:22px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:16px;}
  .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:20px;}
  .row4 .imgslot{height:160px;margin:14px 0 4px;}
  .row4 .gcard{padding:20px;}
  .row4 .gc-tt{font-size:18px;}
  .row4 ol.steps{gap:10px;margin-top:14px;}
  .row4 ol.steps li{font-size:15px;}
  .row4 .tip{font-size:13px;padding:11px 14px;margin-top:auto;}
  .gcard{background:#FAFBFC;border:1px solid #E7E9ED;border-radius:16px;padding:22px;display:flex;flex-direction:column;}
  .gc-head{display:flex;align-items:center;gap:12px;}
  .gc-ic{width:42px;height:42px;border-radius:12px;background:#FFECE9;display:inline-flex;align-items:center;justify-content:center;font-size:22px;flex:none;color:#FD3D00;}
  .gc-ey{font-size:14px;font-weight:700;color:#FD3D00;letter-spacing:0.04em;}
  .gc-tt{font-size:20px;font-weight:800;}
  .imgslot{width:100%;height:250px;margin:16px 0 4px;border-radius:16px;background:#F1F2F4;border:2px dashed #D7DADF;display:flex;align-items:center;justify-content:center;font-size:14px;color:#9aa0a6;text-align:center;padding:8px;}
  .imgslot.anim{border-style:solid;border-color:#E7E9ED;background:#F7F8FA;overflow:hidden;padding:10px;}
  .anim-svg{width:100%;height:100%;display:block;}
  /* HDMI (5.5s): 노트북 자판쪽 포트에 꽂기 → TV 미러링 / 뽑으면 TV엔 가이드화면 */
  @keyframes hdmiPlug2{0%{transform:translateX(24px)}12.5%{transform:translateX(0)}50%{transform:translateX(0)}62.5%{transform:translateX(24px)}100%{transform:translateX(24px)}}
  @keyframes tvGuide{0%,10%{opacity:1}16%,50%{opacity:0}58%,100%{opacity:1}}
  @keyframes tvMirror{0%,16%{opacity:0}22%,50%{opacity:1}56%,100%{opacity:0}}
  .hdmi-plug2{animation:hdmiPlug2 8s ease-in-out infinite}
  .tv-guide{animation:tvGuide 8s ease-in-out infinite}
  .tv-mirror{animation:tvMirror 8s ease-in-out infinite}
  /* Windows (10s): Win+K → 캐스트 선택 → TV 연결허용 → 허용 → 무선 미러링 */
  @keyframes lpKeys{0%{opacity:0}4%,12%{opacity:1}18%,100%{opacity:0}}
  @keyframes lpCast2{0%,12%{opacity:0;transform:translateY(6px)}18%,50%{opacity:1;transform:translateY(0)}56%,100%{opacity:0;transform:translateY(6px)}}
  @keyframes twGuideW{0%,50%{opacity:1}58%,92%{opacity:0}98%,100%{opacity:1}}
  @keyframes twAllowW{0%,36%{opacity:0}42%,56%{opacity:1}61%,100%{opacity:0}}
  @keyframes twMirrorW{0%,57%{opacity:0}64%,92%{opacity:1}97%,100%{opacity:0}}
  @keyframes castWaveW{0%,55%{opacity:0}63%,90%{opacity:0.9}96%,100%{opacity:0}}
  @keyframes clickRipR{0%,24%{opacity:0;transform:scale(0.4)}30%{opacity:0.9;transform:scale(1)}38%,100%{opacity:0;transform:scale(1.7)}}
  @keyframes clickRipA{0%,44%{opacity:0;transform:scale(0.4)}50%{opacity:0.9;transform:scale(1)}58%,100%{opacity:0;transform:scale(1.7)}}
  @keyframes winBtnPress{0%,46%{transform:scale(1)}50%,53%{transform:scale(0.9)}57%,100%{transform:scale(1)}}
  .lp-keys2{animation:lpKeys 10s ease-in-out infinite}
  .lp-cast2{animation:lpCast2 10s ease-in-out infinite;transform-box:fill-box}
  .tw-guide{animation:twGuideW 10s ease-in-out infinite}
  .tw-allow{animation:twAllowW 10s ease-in-out infinite}
  .tw-mirror{animation:twMirrorW 10s ease-in-out infinite}
  .cast-wave{animation:castWaveW 10s ease-in-out infinite}
  .lp-clickR{animation:clickRipR 10s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  .tw-clickA{animation:clickRipA 10s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  .win-allow-btn{animation:winBtnPress 10s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  ol.steps{list-style:none;margin:16px 0 0;padding:0;display:flex;flex-direction:column;gap:13px;}
  ol.steps li{display:flex;gap:12px;align-items:flex-start;font-size:17px;line-height:1.5;word-break:keep-all;}
  .num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:#FD3D00;color:#fff;font-size:15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;}
  .num.warn{background:#FF2D55;}
  .num.ok{background:#2FCB84;}
  .steps b{font-weight:800;}
  .key{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 7px;margin:0 1px;background:#EEF0F3;border:1px solid #CFD3D9;border-bottom-width:2px;border-radius:6px;font-size:13px;font-weight:800;color:#3A3D42;vertical-align:1px;}
  .tip{margin-top:auto;background:#FFF7F5;border-radius:14px;padding:13px 18px;font-size:15px;line-height:1.5;color:#B24435;display:flex;gap:7px;align-items:flex-start;}
  .tip-ic{flex:none;}
  .tip-tx{flex:1;word-break:keep-all;}
  .wl-grid{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
  .wl-h{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:#1F2124;margin-bottom:8px;}
  ol.steps.sm{margin-top:0;gap:9px;}
  ol.steps.sm li{font-size:15px;}
  ol.steps.sm .num{flex:0 0 24px;width:24px;height:24px;font-size:13px;}
  .wl-col.mac-warn{background:#FFF3F0;border:1px solid #FBD9CE;border-radius:12px;padding:12px 14px;}
  .wl-badge{font-size:12px;font-weight:800;color:#fff;background:#FD3D00;padding:2px 9px;border-radius:999px;margin-left:auto;}
  .mac-warn .wl-h{margin-bottom:6px;}
  .wl-note{font-size:14.5px;line-height:1.55;color:#9a3b2c;word-break:keep-all;}
  .imgslot.mac-cable{background:#FFF7F5;border-style:solid;border-color:#FBD9CE;color:#B24435;flex-direction:column;text-align:center;}
  .mac-cable .mc-ic{font-size:40px;line-height:1;}
  .mac-cable .mc-t{font-size:18px;font-weight:800;margin-top:8px;}
  .mac-cable .mc-s{font-size:13px;opacity:0.75;margin-top:3px;}
  .etqbox{display:flex;flex-direction:column;}
  .etqbox .etq-grid{flex:1;align-content:center;}
  .etq{margin-top:auto;background:#fff;border:1px solid #ECEDEF;border-radius:22px;padding:20px 32px;}
  /* 통일된 섹션 박스 (강한 테두리+그림자, TV 가독성) */
  .gsection{background:#fff;border:2px solid #E1E4E9;border-radius:22px;box-shadow:0 6px 22px rgba(0,0,0,0.09);padding:22px 28px;margin-bottom:16px;}
  .gsection .row2,.gsection .row3,.gsection .row4{margin-top:0;}
  .bottomrow{display:flex;gap:16px;margin-top:auto;align-items:stretch;}
  .bottomrow .gsection{flex:1;margin-bottom:0;}
  .toprow{display:flex;gap:16px;align-items:stretch;}
  .toprow .gsection{flex:1;margin-bottom:0;}
  .btmwrap .gsection{margin-bottom:0;}
  .main-std{padding-top:0;padding-bottom:0;}
  .inner.std{justify-content:space-evenly;gap:0;}
  /* 상단 말풍선 (에티켓 옆, 같은 높이) */
  .topbubble{flex:0 0 380px;background:transparent;display:flex;flex-direction:column;justify-content:center;gap:34px;padding:8px 6px;position:relative;overflow:visible;}
  .topbubble .arw{position:absolute;pointer-events:none;opacity:0.9;}
  .topbubble .arw-etq{top:-6px;right:-8px;}
  .topbubble .arw-conn{bottom:-40px;left:34px;transform:scaleX(-1);}
  .topbubble .cb{max-width:86%;padding:16px 22px;font-size:19px;font-weight:800;line-height:1.4;box-shadow:0 4px 14px rgba(0,0,0,0.10);}
  .topbubble .cb-top{align-self:flex-end;background:#fff;color:#3A3D42;border:1px solid #E4E7EC;border-radius:20px 6px 20px 20px;}
  .topbubble .cb-bot{align-self:flex-start;background:linear-gradient(150deg,#FF6A3D,#FD3D00);color:#fff;border-radius:20px 20px 20px 6px;}
  /* 사이드바 Guest Wi-Fi */
  .wifi-side{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:11px;}
  .wifi-side .ws-h{font-size:16px;font-weight:800;}
  .wifi-side .ws-cred{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;white-space:nowrap;}
  .wifi-side .ws-qr{width:150px;height:150px;flex:none;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#9aa0a6;overflow:hidden;padding:6px;}
  .wifi-side .ws-qr-img{width:100%;height:100%;object-fit:contain;display:block;}
  .wifi-side .ql{min-width:30px;text-align:center;display:inline-block;font-size:11.5px;font-weight:800;color:#FD3D00;background:#fff;padding:3px 8px;border-radius:6px;}
  /* 연결 가이드 : HDMI(1) + 무선그룹(2, Mac|Win + 공용 말풍선 1개) */
  .conn3{display:grid;grid-template-columns:1fr 2fr;gap:22px;}
  .conn4{display:grid;grid-template-columns:1fr 1fr 2fr;gap:16px;}
  .wgroup{display:flex;flex-direction:column;gap:16px;min-width:0;}
  .wpair{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-width:0;}
  .wpair.one{grid-template-columns:1fr;}
  .wgroup > .tip{margin-top:0;}
  .conn4 .imgslot{height:150px;margin:14px 0 4px;}
  .conn4 .gcard{padding:20px;}
  .conn4 .gc-tt{font-size:17px;}
  .conn4 ol.steps{gap:9px;margin-top:12px;}
  .conn4 ol.steps li{font-size:14px;}
  .conn4 .mc-t{font-size:15px;}
  .conn4 .tip{font-size:13px;padding:11px 14px;}
  .qr{flex:0 0 380px;background:#fff;border:2px solid #E1E4E9;border-radius:22px;box-shadow:0 6px 22px rgba(0,0,0,0.09);padding:24px 26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .qr .qh{font-size:23px;font-weight:800;color:#1F2124;}
  .qr .qimg{width:190px;height:190px;background:#F1F2F4;border:2px dashed #D7DADF;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#9aa0a6;text-align:center;line-height:1.5;}
  .qr .qs{font-size:14px;color:#8A9099;text-align:center;line-height:1.4;}
  .qr .qcred{width:100%;display:flex;flex-direction:column;gap:7px;align-items:center;}
  .qr .qcr{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:#1F2124;}
  .qr .ql{flex:none;min-width:38px;text-align:center;display:inline-block;font-size:12.5px;font-weight:800;color:#fff;background:#FD3D00;padding:3px 9px;border-radius:7px;}
  .etq-h{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .etq-bar{width:7px;height:24px;border-radius:3px;background:#FD3D00;}
  .etq-h h3{margin:0;font-size:23px;font-weight:800;}
  .etq-h .s{font-size:16px;color:#8A9099;font-weight:500;}
  .etq-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .etq-item{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .etq-circle{width:76px;height:76px;border-radius:50%;background:#FFECE9;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .etq-item span{font-size:16px;font-weight:600;}
  .ulm{list-style:none;margin:18px 0 0;padding:0;display:flex;flex-direction:column;gap:13px;}
  .ulm li{display:flex;gap:11px;align-items:flex-start;font-size:16px;line-height:1.5;}
  .ulm .dot{color:#FD3D00;font-weight:800;}
  .vc{background:#fff;border:1px solid #ECEDEF;border-radius:22px;padding:20px;display:flex;gap:24px;margin-top:16px;}
  .vc-r{flex:1;display:flex;flex-direction:column;justify-content:center;}

  /* ===== 방 선택 (B 다크) ===== */
  .picker{width:100%;height:100%;padding:40px 64px;color:#fff;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .pk-brand{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:800;letter-spacing:2.5px;color:#FD3D00;}
  .pk-brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#FD3D00,#D63400);box-shadow:0 0 12px rgba(253,61,0,0.9);}
  .pk-title{font-size:34px;font-weight:800;letter-spacing:-1.5px;margin-top:8px;color:#F7F8FA;}
  .pk-sub{font-size:14px;color:#8b8f9c;margin-top:6px;font-weight:500;}
  .pgrp{margin-top:18px;}
  .pgrp h3{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;color:#FD3D00;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px;}

// 마지막으로 성공한 실제 일정을 보관 → 오류·지연 시 샘플 대신 이 데이터를 유지
let lastEvents=null, everLoaded=false;

function loadSchedule(key){
  if(!CONFIG.appsScriptUrl){renderSched([], 'loading');return;}
  const cb='cb_'+Math.random().toString(36).slice(2);
  const s=document.createElement('script');
  let done=false;
  const cleanup=()=>{try{delete window[cb];s.remove();}catch(e){}};
  const ok=(events)=>{if(done)return;done=true;lastEvents=events;everLoaded=true;renderSched(events,'ok');cleanup();};
  // 실패/지연 시: 한 번이라도 불러온 적 있으면 마지막 정상 일정을 그대로 유지 (샘플 표시 안 함)
  const fail=()=>{if(done)return;done=true; everLoaded?renderSched(lastEvents,'ok'):renderSched([], 'loading'); cleanup();};
  window[cb]=(data)=>ok((data&&data.events)||[]);
  s.onerror=fail;
  s.src=CONFIG.appsScriptUrl+'?room='+encodeURIComponent(key)+'&callback='+cb;
  document.head.appendChild(s);
  setTimeout(fail, 15000); // 응답 지연 허용치 (Apps Script 콜드스타트 대비)
}
function renderSched(events,mode){
  events=events||[];
  const loading=(mode==='loading');
  const listEl=document.getElementById('schList'),stEl=document.getElementById('schStatus');
  if(!listEl)return;
  const now=Date.now();const busy=events.some(e=>now>=e.start&&now<e.end);
  const MINGAP=15*60000; // 구글 캘린더 15분 단위 → 15분 미만 빈틈은 사용 불가
  const _eod=new Date();_eod.setHours(23,59,59,0);const eodMs=_eod.getTime();
  const _next=events.filter(e=>e.start>now).sort((a,b)=>a.start-b.start);
  const nextStart=_next.length?_next[0].start:eodMs;
  const availableNow=!busy && (nextStart-now)>=MINGAP; // 지금부터 15분 이상 비어야 사용 가능
  if(stEl){
    const cls=loading?'s-loading':(availableNow?'s-free':'s-busy');
    const label=loading?'확인 중':(availableNow?'사용 가능':'사용 중');
    stEl.className='sched-status '+cls;
    stEl.innerHTML='<span class="sdot"></span>'+label;
  }
  if(loading && !events.length){listEl.className='sched-list';listEl.innerHTML=`<div class="sch-empty">일정을 불러오는 중…</div>`;return;}
  // 지금 비어있으면 "사용 가능" 슬롯을 타임라인에 카드로 끼워넣기 (진행중 카드와 동일 뷰)
  let items=events.slice();
  if(!loading){
    // 지금~하루 끝까지의 모든 빈 시간대(gap, 15분 이상)를 "예약 가능" 카드로 채움
    const fut=events.filter(e=>e.end>now).sort((a,b)=>a.start-b.start);
    let cursor=now;
    fut.forEach(e=>{
      if(e.start-cursor>=MINGAP){ items.push({__slot:true,active:(cursor<=now+1000),start:cursor,end:e.start,hasNext:true}); }
      cursor=Math.max(cursor,e.end);
    });
    if(eodMs-cursor>=MINGAP){ items.push({__slot:true,active:(cursor<=now+1000),start:cursor,end:eodMs,hasNext:false}); }
  }
  if(!items.length){listEl.className='sched-list';listEl.innerHTML=`<div class="sch-empty">오늘 예약이 없습니다</div>`;return;}
  const itemsHtml=items.sort((a,b)=>a.start-b.start).map(e=>{
    if(e.__slot){
      if(e.active){
        const tt=e.hasNext?('지금 – '+fmt(e.end)):'지금 바로 사용 가능';
        let sub;
        if(e.hasNext){ let m=Math.floor((e.end-now)/60000); m=Math.floor(m/15)*15; const dur=m<60?(m+'분'):(Math.floor(m/60)+'시간'+(m%60?' '+(m%60)+'분':'')); sub='약 '+dur+' 여유 · 지금 예약!'; }
        else { sub='지금 바로 예약하세요!'; }
        return `<div class="sch-item free"><div class="free-tag"><span class="blink">●</span> 사용 가능</div><div class="t">${tt}</div><div class="n">${sub}</div></div>`;
      }
      const tt=e.hasNext?(fmt(e.start)+' – '+fmt(e.end)):(fmt(e.start)+' 이후');
      return `<div class="sch-item soon"><div class="soon-tag"><span class="blink">●</span> 예약 가능 시간대</div><div class="t">${tt}</div></div>`;
    }
    const on=now>=e.start&&now<e.end, past=e.end<=now;
    const cls='sch-item'+(on?' now':'')+(past?' past':'');
    return `<div class="${cls}">${on?'<div class="now-tag"><span class="blink">●</span> 진행 중</div>':''}<div class="t">${fmt(e.start)} – ${fmt(e.end)}</div><div class="n">${e.title||"예약됨"}</div></div>`;
  }).join("");
  // 자동 맞춤: 1열로 그려보고, 세로/가로로 넘치면 2열 → 그래도 넘치면 촘촘 모드
  listEl.className='sched-list';
  listEl.innerHTML=itemsHtml;
  const over=()=>listEl.clientHeight>0 && (listEl.scrollHeight>listEl.clientHeight+2 || listEl.scrollWidth>listEl.clientWidth+2);
  if(over()){ listEl.className='sched-list two'; if(over()){ listEl.className='sched-list two dense'; } }
}

function fit(){
  const page=document.getElementById('page');
  // transform 스케일 (GPU 가속, 샤오미 등 정품 크로미움에서 선명)
  const s=Math.min(window.innerWidth/1920, window.innerHeight/1080);
  page.style.transform='scale('+s+')';
}
function render(){
  const page=document.getElementById('page'),fitw=document.getElementById('fit');
  const key=(getParam('room')||'').toLowerCase();const room=ROOMS[key];
  fitw.classList.toggle('dark',!room);
  page.style.width='1920px';page.style.height='1080px';
  if(!room){
    page.style.background='transparent';
    page.innerHTML=viewPicker();
  } else {
    const t=TYPES[room.type]||TYPES.general;
    page.style.width='1920px';page.style.height='1080px';page.style.background='#fff';
    page.innerHTML=sidebar(room,t)+(t.kind==="interview"?mainInterview(room,t):mainStandard(room,t));
    document.title=room.name+' · 회의실 가이드';
    // 15초 주기 폴링(+지터) → 서버가 요청 시 최신화하므로 신선도 ≈ 폴링 주기(약 15초)
    const calKey=room.cal||key;
    loadSchedule(calKey);
    (function poll(){ setTimeout(function(){ loadSchedule(calKey); poll(); }, 15000+Math.floor(Math.random()*5000)); })();
  }
  fit();
}
window.addEventListener('resize',fit);
render();

/* 새 배포 자동 감지 → 자동 새로고침 (스틱에서 수동 새로고침 불필요) */
var __deployStamp=null;
function __checkDeploy(){
  fetch('index.html?_t='+Date.now(),{method:'HEAD',cache:'no-store'})
    .then(function(r){
      var lm=r.headers.get('ETag')||r.headers.get('Last-Modified');
      if(lm){ if(__deployStamp && lm!==__deployStamp){ location.reload(); } __deployStamp=lm; }
    }).catch(function(){});
}
__checkDeploy();                         // 최초 기준값 기록
setInterval(__checkDeploy, 5*60*1000);   // 5분마다 새 배포 확인 → 있으면 자동 새로고침
</script>
